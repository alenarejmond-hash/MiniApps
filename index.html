<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Elena Sotnikova | IT-Визитка будущего</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/page-flip/dist/js/page-flip.browser.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        /* --- Quiet Luxury Fonts --- */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:wght@700&display=swap');

        :root {
            /* Light Theme (Rose Gold / Neumorphism) */
            --bg-gradient: linear-gradient(180deg, #fdf8f6 0%, #f4e0d9 100%);
            --glass-bg: rgba(255, 255, 255, 0.4);
            --glass-border: rgba(255, 255, 255, 0.7);
            --text-primary: #5a3d36;
            --text-secondary: #9c7b73;
            --accent: #b07d6f;
            --accent-gradient: linear-gradient(135deg, #e4b6a9 0%, #c48c7c 100%);
            --shadow-light: rgba(255, 255, 255, 0.9);
            --shadow-dark: rgba(214, 190, 184, 0.6);
            --card-shadow: 10px 10px 20px var(--shadow-dark), -10px -10px 20px var(--shadow-light);
            --btn-shadow: 5px 5px 12px var(--shadow-dark), -5px -5px 12px var(--shadow-light);
            --btn-inset: inset 3px 3px 8px var(--shadow-dark), inset -3px -3px 8px var(--shadow-light);
        }

        [data-theme="dark"] {
            /* Dark Theme (Noble Black & Gray) */
            --bg-gradient: linear-gradient(180deg, #222222 0%, #181818 100%);
            --glass-bg: rgba(30, 30, 30, 0.4);
            --glass-border: rgba(255, 255, 255, 0.05);
            --text-primary: #f5f5f5;
            --text-secondary: #999999;
            --accent: #e0e0e0;
            --accent-gradient: linear-gradient(135deg, #ffffff 0%, #a0a0a0 100%);
            --shadow-light: rgba(255, 255, 255, 0.04);
            --shadow-dark: rgba(0, 0, 0, 0.6);
            --card-shadow: 10px 10px 20px var(--shadow-dark), -10px -10px 20px var(--shadow-light);
            --btn-shadow: 4px 4px 10px var(--shadow-dark), -4px -4px 10px var(--shadow-light);
            --btn-inset: inset 3px 3px 8px var(--shadow-dark), inset -3px -3px 8px var(--shadow-light);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-gradient);
            color: var(--text-primary);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            /* 3. Адаптация под TG: динамическая высота и безопасные зоны */
            min-height: var(--tg-viewport-height, 100vh);
            padding-bottom: env(safe-area-inset-bottom);
            overflow-x: hidden;
            transition: background 0.5s ease;
            -webkit-tap-highlight-color: transparent; /* Убирает системный синий блик при тапе на кнопки */
        }

        /* --- Neumorphic Glassmorphism --- */
        .glass {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 25px;
            border: 1px solid var(--glass-border);
            box-shadow: var(--card-shadow);
        }

        /* --- TabBar (Pill Shape from mockup) --- */
        .tabbar {
            position: fixed;
            /* 4. Приподнято меню, чтобы не перекрывать текст футера */
            bottom: 45px;
            left: 50%;
            transform: translateX(-50%);
            width: 85%;
            max-width: 350px;
            height: 65px;
            border-radius: 35px; /* Fully rounded pill */
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 100;
            padding: 0 15px;
            box-sizing: border-box;
            background: var(--bg-gradient);
            box-shadow: var(--card-shadow);
            border: 1px solid var(--glass-border);
        }

        .tab {
            color: var(--text-secondary);
            font-size: 22px;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 45px;
            height: 45px;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 50%;
            user-select: none; /* Запрет выделения текста на кнопках */
        }

        .tab.active {
            color: var(--accent);
            box-shadow: var(--btn-inset); /* Depressed effect for active tab */
        }

        /* --- Sections --- */
        .section {
            display: none;
            width: 100%;
            padding: 60px 20px 130px; /* Увеличен нижний отступ, чтобы не перекрывалось меню */
            box-sizing: border-box;
            flex-direction: column;
            align-items: center;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        .section.active {
            display: flex;
            opacity: 1;
        }

        /* --- Global Animations --- */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 15px var(--accent); }
            50% { transform: scale(1.02); box-shadow: 0 0 25px var(--accent); }
            100% { transform: scale(1); box-shadow: 0 0 15px var(--accent); }
        }

        /* --- Page 1: Home --- */
        #home-section h1 {
            font-family: 'Playfair Display', serif;
            font-size: 34px;
            margin-bottom: 5px;
            color: var(--text-primary);
            animation: fadeIn 1s ease;
        }
        
        #home-section p {
            color: var(--text-secondary);
        }

        .scanner-container {
            position: relative;
            margin: 40px 0;
            animation: fadeIn 1s ease;
        }

        .avatar-frame {
            width: 160px;
            height: 160px;
            border-radius: 50%;
            padding: 8px;
            background: var(--bg-gradient);
            box-shadow: var(--card-shadow);
            border: 2px solid var(--glass-border);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .avatar {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
        }

        .scanner-line {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.9);
            box-shadow: 0 0 12px 4px var(--accent);
            border-radius: 5px;
            animation: scan 2s linear infinite;
            display: none;
        }

        @keyframes scan {
            0% { top: 0; }
            50% { top: 100%; }
            100% { top: 0; }
        }

        #scan-btn {
            background: var(--bg-gradient);
            color: var(--accent);
            border: none;
            padding: 18px 40px;
            border-radius: 30px;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            margin-bottom: 20px;
            box-shadow: var(--btn-shadow);
            transition: all 0.2s ease;
            animation: fadeIn 1s ease;
        }
        
        #scan-btn:active {
            box-shadow: var(--btn-inset);
            transform: scale(0.98);
        }

        #vibe-result {
            font-style: italic;
            color: var(--accent);
            text-align: center;
            min-height: 40px;
            font-weight: 600;
        }

        /* --- Page 2: 3D Magazine --- */
        .portfolio-magazine {
            width: 320px; 
            height: 440px;
            margin: 20px 0;
            animation: fadeIn 1s ease;
            border-radius: 15px;
            box-shadow: var(--card-shadow);
        }

        .page {
            background: var(--bg-gradient);
            overflow: hidden;
            border-right: 1px solid var(--glass-border);
        }

        .page-content {
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            height: 100%;
            box-sizing: border-box;
            color: var(--text-primary);
        }

        .page-content h3 { font-family: 'Playfair Display', serif; margin: 0; }
        .page-content p { font-size: 14px; margin: 10px 0; color: var(--text-secondary); }
        .page-img { width: 100%; height: 65%; object-fit: cover; border-radius: 15px; box-shadow: var(--btn-shadow); pointer-events: none; }

        /* --- Page 3: Services (New UI from mockup) --- */
        .service-list {
            width: 100%;
            max-width: 350px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            animation: fadeIn 1s ease;
        }

        .service-item {
            display: flex;
            align-items: center;
            padding: 15px 20px;
            border-radius: 40px; /* Pill shape for items */
            background: var(--bg-gradient);
            box-shadow: var(--btn-shadow);
            transition: transform 0.3s ease;
            cursor: pointer;
            border: 1px solid var(--glass-border);
        }
        
        .service-item:active {
            box-shadow: var(--btn-inset);
        }

        .service-icon {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: var(--bg-gradient);
            box-shadow: var(--btn-inset);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 22px;
            margin-right: 15px;
            border: 1px solid var(--glass-border);
        }

        .service-info h3 {
            margin: 0;
            font-size: 16px;
            color: var(--text-primary);
        }
        
        .service-info p {
            margin: 4px 0 0 0;
            font-size: 12px;
            color: var(--text-secondary);
        }

        /* --- Easter Egg & Controls --- */
        .footer {
            width: 100%;
            text-align: center;
            font-size: 12px;
            color: var(--text-secondary);
            padding: 10px 0;
            /* 4. Позиционирование футера: жестко внизу экрана под меню */
            position: fixed;
            bottom: 10px;
            cursor: pointer;
            z-index: 10;
        }
        
        .controls {
            position: fixed;
            top: 20px;
            right: 20px;
            display: flex;
            gap: 15px;
            z-index: 101;
        }
        
        .icon-btn {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: var(--bg-gradient);
            box-shadow: var(--btn-shadow);
            color: var(--text-primary);
            font-size: 20px;
            cursor: pointer;
            border: 1px solid var(--glass-border);
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.2s ease;
        }
        
        .icon-btn:active {
            box-shadow: var(--btn-inset);
        }
    </style>
</head>
<body data-theme="light" data-lang="ru">

    <div class="controls">
        <button class="icon-btn" onclick="toggleTheme()"><i id="theme-icon">💡</i></button>
        <button class="icon-btn" onclick="toggleLang()"><i id="lang-icon">🇬🇧</i></button>
    </div>

    <!-- Контент сюда будет подгружаться автоматически из блока настроек ниже -->
    <section id="home-section" class="section active">
        <h1 class="lang" id="ui-name" data-ru="" data-en=""></h1>
        <p class="lang" id="ui-role" data-ru="" data-en=""></p>
        
        <div class="scanner-container">
            <div class="avatar-frame">
                <img id="ui-photo" src="" alt="Avatar" class="avatar">
            </div>
            <div class="scanner-line"></div>
        </div>

        <button id="scan-btn" class="lang" data-ru="" data-en="" onclick="startScan()"></button>
        <p id="vibe-result"></p>
    </section>

    <!-- Секция Услуг -->
    <section id="services-section" class="section">
        <h2 class="lang" data-ru="Мои Услуги" data-en="My Services" style="font-family: 'Playfair Display', serif; color: var(--text-primary); margin-bottom: 20px;">Мои Услуги</h2>
        <div class="service-list" id="ui-services">
            <!-- Услуги генерируются из настроек -->
        </div>
    </section>

    <!-- Секция Портфолио -->
    <section id="portfolio-section" class="section">
        <h2 class="lang" data-ru="Портфолио-Журнал" data-en="Portfolio Magazine" style="font-family: 'Playfair Display', serif; color: var(--text-primary); margin-bottom: 20px;">Портфолио-Журнал</h2>
        <div id="magazine-wrapper">
            <div class="portfolio-magazine" id="magazine">
                <!-- Страницы генерируются из настроек -->
            </div>
        </div>
    </section>

    <!-- 2. Исправленные кнопки меню (передаем this для точного переключения) -->
    <nav class="tabbar glass">
        <div class="tab active" onclick="showSection('home-section', this)">🏠</div>
        <div class="tab" onclick="showSection('services-section', this)">✨</div>
        <div class="tab" onclick="showSection('portfolio-section', this)">📚</div>
    </nav>

    <!-- 4. Текст теперь всегда внизу -->
    <div class="footer" id="ui-footer" onclick="triggerEasterEgg()"></div>

    <script>
        // =========================================================================
        // 1. БЛОК НАСТРОЕК (МЕНЯЙТЕ ТЕКСТ, ФОТО, ССЫЛКИ И ПЕРЕВОДЫ ТОЛЬКО ЗДЕСЬ)
        // =========================================================================
        const APP_CONTENT = {
            profile: {
                name: { ru: "Elena Sotnikova", en: "Elena Sotnikova" },
                role: { ru: "Web Designer & Code Alchemist", en: "Web Designer & Code Alchemist" },
                photo: "photo.jpg" // ССЫЛКА НА ВАШЕ ФОТО
            },
            scannerBtn: { ru: "Считать вайб", en: "Read Vibe" },
            scannerMessages: {
                scanning: { ru: "Считываю ваш вайб...", en: "Reading your vibe..." },
                results: [
                    { ru: "Вайб: Творческий поток ✨. Идеально для новой IT-визитки!", en: "Vibe: Creative Flow ✨. Perfect for a new IT-visiting card!" },
                    { ru: "Вайб: Техно-Дзен 🧘‍♀️. Пора упрощать сложные системы!", en: "Vibe: Tech Zen 🧘‍♀️. Time to simplify complex systems!" },
                    { ru: "Вайб: Весеннее Обострение (в хорошем смысле) 🌸!", en: "Vibe: Spring Fever (the good kind) 🌸!" }
                ]
            },
            services: [
                { icon: "📱", title: { ru: "Mini App Визитка", en: "Mini App Card" }, desc: { ru: "В стиле Quiet Luxury", en: "In Quiet Luxury style" } },
                { icon: "✨", title: { ru: "UI/UX Дизайн", en: "UI/UX Design" }, desc: { ru: "Современные тренды", en: "Modern design trends" } },
                { icon: "🤖", title: { ru: "Интеграция ИИ", en: "AI Integration" }, desc: { ru: "Автоматизация процессов", en: "Process automation" } },
                { icon: "💡", title: { ru: "Менторство", en: "Mentorship" }, desc: { ru: "Обучение вайбкодингу", en: "Vibecoding lessons" } }
            ],
            portfolio: [
                { title: {ru: 'Кейс 1', en: 'Case 1'}, desc: {ru: 'Психолог Александра', en: 'Psychologist Alexandra'}, img: 'case1.jpg' },
                { title: {ru: 'Кейс 2', en: 'Case 2'}, desc: {ru: 'Тревел-агент', en: 'Travel Agent'}, img: 'case2.jpg' },
                { title: {ru: 'Кейс 3', en: 'Case 3'}, desc: {ru: 'Сервис медитаций', en: 'Meditation App'}, img: 'case3.jpg' }
            ],
            footerText: "design & code by Elena Sotnikova"
        };
        // =========================================================================
        // КОНЕЦ БЛОКА НАСТРОЕК (Дальше идет технический код, его лучше не трогать)
        // =========================================================================

        // Initialize Telegram WebApp & 3. Адаптация высоты
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();
        
        // 2. Открываем сразу на весь экран (для новых версий TG)
        try { 
            if (tg.isVersionAtLeast && tg.isVersionAtLeast('8.0')) {
                tg.requestFullscreen(); 
            }
        } catch(e) {}

        // 3. Функция обновления цвета шторки TG под дизайн
        function updateTgAppColors(theme) {
            try {
                if (theme === 'dark') {
                    tg.setHeaderColor('#222222');
                    tg.setBackgroundColor('#222222');
                } else {
                    tg.setHeaderColor('#fdf8f6');
                    tg.setBackgroundColor('#fdf8f6');
                }
            } catch(e) {}
        }
        
        // Устанавливаем правильный цвет при старте
        updateTgAppColors(document.body.getAttribute('data-theme'));

        // 1. Вспомогательная функция для вибрации
        function triggerVibration() {
            if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
        }

        function updateTgHeight() {
            document.documentElement.style.setProperty('--tg-viewport-height', `${tg.viewportHeight}px`);
        }
        updateTgHeight();
        tg.onEvent('viewportChanged', updateTgHeight);

        // --- Инициализация контента из APP_CONTENT ---
        function initContent() {
            const lang = document.body.getAttribute('data-lang');

            // Профиль
            const nameEl = document.getElementById('ui-name');
            nameEl.setAttribute('data-ru', APP_CONTENT.profile.name.ru);
            nameEl.setAttribute('data-en', APP_CONTENT.profile.name.en);
            nameEl.innerText = APP_CONTENT.profile.name[lang];

            const roleEl = document.getElementById('ui-role');
            roleEl.setAttribute('data-ru', APP_CONTENT.profile.role.ru);
            roleEl.setAttribute('data-en', APP_CONTENT.profile.role.en);
            roleEl.innerText = APP_CONTENT.profile.role[lang];

            document.getElementById('ui-photo').src = APP_CONTENT.profile.photo;

            // Кнопка сканера
            const scanBtnEl = document.getElementById('scan-btn');
            scanBtnEl.setAttribute('data-ru', APP_CONTENT.scannerBtn.ru);
            scanBtnEl.setAttribute('data-en', APP_CONTENT.scannerBtn.en);
            scanBtnEl.innerText = APP_CONTENT.scannerBtn[lang];

            // Услуги
            const servicesContainer = document.getElementById('ui-services');
            servicesContainer.innerHTML = '';
            APP_CONTENT.services.forEach(item => {
                servicesContainer.innerHTML += `
                    <div class="service-item">
                        <div class="service-icon">${item.icon}</div>
                        <div class="service-info">
                            <h3 class="lang" data-ru="${item.title.ru}" data-en="${item.title.en}">${item.title[lang]}</h3>
                            <p class="lang" data-ru="${item.desc.ru}" data-en="${item.desc.en}">${item.desc[lang]}</p>
                        </div>
                    </div>
                `;
            });

            // Футер
            document.getElementById('ui-footer').innerText = APP_CONTENT.footerText;

            // Обновляем журнал только если секция активна, иначе откладываем
            if (document.getElementById('portfolio-section').classList.contains('active')) {
                initMagazine();
            } else {
                magazineInitialized = false;
            }
        }

        // --- Multi-language Logic ---
        function toggleLang() {
            triggerVibration(); // 1. Вибрация
            const currentLang = document.body.getAttribute('data-lang');
            const newLang = currentLang === 'ru' ? 'en' : 'ru';
            document.body.setAttribute('data-lang', newLang);
            document.getElementById('lang-icon').innerText = newLang === 'ru' ? '🇬🇧' : '🇷🇺';

            // Find all lang elements and update text
            document.querySelectorAll('.lang').forEach(el => {
                el.innerText = el.getAttribute(`data-${newLang}`);
            });
            
            // Если мы на странице портфолио, перерисовываем журнал для обновления языка
            if (document.getElementById('portfolio-section').classList.contains('active')) {
                initMagazine();
            } else {
                magazineInitialized = false;
            }
        }

        // --- Dark/Light Mode Logic ---
        function toggleTheme() {
            triggerVibration(); // 1. Вибрация
            const currentTheme = document.body.getAttribute('data-theme');
            const newTheme = currentTheme === 'light' ? 'dark' : 'light';
            document.body.setAttribute('data-theme', newTheme);
            document.getElementById('theme-icon').innerText = newTheme === 'light' ? '💡' : '🌙';
            
            updateTgAppColors(newTheme); // 3. Обновляем цвет шторки TG

            // Re-init magazine on theme change for best look
            if (document.getElementById('portfolio-section').classList.contains('active')) {
                setTimeout(initMagazine, 100);
            } else {
                magazineInitialized = false;
            }
        }

        // --- 2. Исправленная логика переключения секций ---
        let magazineInitialized = false;

        function showSection(sectionId, clickedTab) {
            triggerVibration(); // 1. Вибрация при переключении меню

            // Hide all sections
            document.querySelectorAll('.section').forEach(el => el.classList.remove('active'));
            // Remove active from all tabs
            document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));

            // Show target section
            document.getElementById(sectionId).classList.add('active');
            
            // Точно активируем нажатую кнопку (исправление бага)
            if (clickedTab) {
                clickedTab.classList.add('active');
            }
            
            if(sectionId === 'portfolio-section' && !magazineInitialized) {
                initMagazine();
                magazineInitialized = true;
            }
        }

        // --- Vibe-Scanner Logic ---
        function startScan() {
            triggerVibration(); // 1. Вибрация
            const lang = document.body.getAttribute('data-lang');
            const resultEl = document.getElementById('vibe-result');
            const scanLine = document.querySelector('.scanner-line');
            const scanBtn = document.getElementById('scan-btn');

            resultEl.innerText = APP_CONTENT.scannerMessages.scanning[lang];
            scanLine.style.display = 'block';
            scanBtn.disabled = true;

            setTimeout(() => {
                const results = APP_CONTENT.scannerMessages.results;
                const randomResult = results[Math.floor(Math.random() * results.length)];
                resultEl.innerText = randomResult[lang];
                scanLine.style.display = 'none';
                scanBtn.disabled = false;
            }, 3000); // 3 seconds scan simulation
        }

        // --- 3D Magazine Logic ---
        let pageFlip;
        function initMagazine() {
            const lang = document.body.getAttribute('data-lang');
            
            // Destroy instance if exists to re-render properly
            if (pageFlip) {
                pageFlip.destroy();
            }
            
            // Восстанавливаем контейнер, так как destroy() мог его удалить
            const wrapper = document.getElementById('magazine-wrapper');
            wrapper.innerHTML = '<div class="portfolio-magazine" id="magazine"></div>';
            const magazineEl = document.getElementById('magazine');

            // Hard density first page (Cover simulation)
            magazineEl.innerHTML += `<div class="page" data-density="hard"><div class="page-content"><h3>Digital Zen</h3><p>Design & Code Alchemist</p></div></div>`;

            // Case pages
            APP_CONTENT.portfolio.forEach(p => {
                magazineEl.innerHTML += `
                    <div class="page">
                        <div class="page-content">
                            <h3>${p.title[lang]}</h3>
                            <p>${p.desc[lang]}</p>
                            <img src="${p.img}" alt="${p.title[lang]}" class="page-img" onerror="this.style.display='none'">
                        </div>
                    </div>
                `;
            });

            // Hard density last page
            magazineEl.innerHTML += `<div class="page" data-density="hard"><div class="page-content"><h3>Vibe Art</h3><p>@alena_it_vizitka</p></div></div>`;

            pageFlip = new St.PageFlip(magazineEl, {
                width: 320, height: 440,
                size: "fixed", // Жесткая фиксация размера убирает дергания
                minWidth: 320, minHeight: 440,
                showCover: false, 
                flippingTime: 800, // Сделали анимацию чуть быстрее
                usePortrait: true,
                maxShadowOpacity: 0.3 // Мягкие тени
            });
            
            pageFlip.loadFromHTML(document.querySelectorAll('.page'));

            // 1. Добавляем вибрацию при перелистывании страниц книги
            pageFlip.on('flip', (e) => {
                triggerVibration();
            });
        }

        // --- Easter Egg Logic (3 taps) ---
        let footerTapCount = 0;
        function triggerEasterEgg() {
            footerTapCount++;
            if (footerTapCount === 3) {
                confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 } });
                if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
                footerTapCount = 0;
            }
        }

        // Инициализация при загрузке
        window.addEventListener('DOMContentLoaded', initContent);

    </script>
</body>
</html>
