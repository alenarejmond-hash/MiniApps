<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Trobetrotter</title>
    
    <!-- Подключаем Tailwind для стилей -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Подключаем React -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    
    <!-- Подключаем Babel, чтобы браузер понял React-код внутри HTML -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Подключаем Telegram Web App SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <!-- Подключаем парсер для Google Таблиц (магия данных) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

    <!-- Подключаем рукописный шрифт для подписи на фото и основной элегантный шрифт -->
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@600&family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">

    <style>
        body { margin: 0; padding: 0; font-family: 'Lora', serif; -webkit-tap-highlight-color: transparent; }
        @keyframes slideUpFade {
            0% { opacity: 0; transform: translateY(30px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeIn {
            0% { opacity: 0; }
            100% { opacity: 1; }
        }
        .animate-item {
            animation: slideUpFade 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
        }
        .animate-fade {
            animation: fadeIn 0.5s ease-out forwards;
        }

        /* --- ТЕКСТУРА БУМАГИ --- */
        .bg-paper {
            background-color: #fce2b1; /* Обновленный теплый бежевый */
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.95' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.35'/%3E%3C/svg%3E");
            box-shadow: inset 0 0 100px rgba(0,0,0,0.1);
        }

        /* --- СТИЛЬ ПОЧТОВОЙ МАРКИ --- */
        .postage-stamp {
            background: white;
            padding: 4px;
            filter: drop-shadow(2px 3px 5px rgba(0,0,0,0.2));
            /* Классический эффект зазубренных краев марки через маску */
            --g: radial-gradient(4px at 4px 4px, #0000 98%, #000 101%);
            -webkit-mask: 
                var(--g) 0 0 / 100% 8px repeat-x,
                var(--g) 0 0 / 8px 100% repeat-y,
                var(--g) 100% 100% / 100% 8px repeat-x,
                var(--g) 100% 100% / 8px 100% repeat-y,
                linear-gradient(#000 0 0) center / calc(100% - 8px) calc(100% - 8px) no-repeat;
            mask: 
                var(--g) 0 0 / 100% 8px repeat-x,
                var(--g) 0 0 / 8px 100% repeat-y,
                var(--g) 100% 100% / 100% 8px repeat-x,
                var(--g) 100% 100% / 8px 100% repeat-y,
                linear-gradient(#000 0 0) center / calc(100% - 8px) calc(100% - 8px) no-repeat;
        }

        /* --- СИМУЛЯТОР ТЕЛЕФОНА ДЛЯ ПРЕДПРОСМОТРА --- */
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .mobile-simulator {
            height: 100dvh;
            width: 100%;
            position: relative;
            overflow-x: hidden;
            overflow-y: auto;
        }
        @media (min-width: 640px) {
            .mobile-simulator {
                height: 800px;
                max-width: 400px;
                border-radius: 45px;
                border: 12px solid #121212;
                box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
            }
        }
        .mobile-simulator > div {
            min-height: 100% !important;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // =========================================================================================
        // 💖 ВАЙБКОДЕР ЗОНА: НАСТРОЙКИ ПРОЕКТА (МЕНЯЙТЕ ТЕКСТ И ССЫЛКИ В КАВЫЧКАХ) 💖
        // =========================================================================================

        const CONFIG = {
            // --- 1. ГЛАВНЫЙ ЭКРАН ---
            brandName: "Ольга Иванова", 
            slogan: "Твой личный тревел-эксперт", 
            avatarUrl: "https://images.unsplash.com/photo-1573496359142-b8d87734a5a2?auto=format&fit=crop&q=80&w=200",

            // --- 2. БАЗА ДАННЫХ ТУРОВ (Ссылка на твою Google Таблицу CSV) ---
            googleSheetUrl: "https://docs.google.com/spreadsheets/d/e/2PACX-1vSaRWByT--Ch96eWyxGr2fKuwK7NFITq0YG6g_k6fZkP78CreHlEHB96AU1x6fLyiRT9SxW2_xRTGsG/pub?gid=0&single=true&output=csv",

            // --- 3. РАЗДЕЛ "ОБО МНЕ" ---
            about: {
                title: "Обо мне",
                text: "Привет! Я твой личный тревел-эксперт. Я помогаю людям находить идеальные места для отдыха, организую незабываемые туры и беру всю рутину с документами на себя. Моя цель — сделать так, чтобы ты просто собрал чемодан и наслаждался отпуском!",
                photoUrl: "https://images.unsplash.com/photo-1436491865332-7a61a109cc05?auto=format&fit=crop&q=80&w=400",
            },

            // --- 4. ССЫЛКА ДЛЯ КНОПКИ "БРОНИРОВАНИЕ" ---
            bookingLink: "https://t.me/telegram", 

            // --- 5. КОНТАКТЫ ---
            contacts: {
                telegram: "https://t.me/telegram",
                instagram: "https://instagram.com/instagram",
                whatsapp: "https://wa.me/1234567890",
                phone: "+7 (999) 123-45-67"
            },

            // --- 6. ТЕХНИЧЕСКИЕ НАСТРОЙКИ FIREBASE (Пока не трогаем) ---
            firebaseConfig: {
                apiKey: "AIzaSyDrraU_Y3l8B9_R6Dl3PgKVucEluG_Bacw",
                authDomain: "mini-apps-d5096.firebaseapp.com",
                projectId: "mini-apps-d5096",
                storageBucket: "mini-apps-d5096.firebasestorage.app",
                messagingSenderId: "625952325109",
                appId: "1:625952325109:web:a0de707bc19b50005574bc"
            }
        };

        // =========================================================================================
        // 🛑 СТОП-ЛИНИЯ! ДАЛЬШЕ ИДЕТ СЛОЖНЫЙ КОД! НЕ ТРОГАЕМ, ЧТОБЫ МАГИЯ НЕ СЛОМАЛАСЬ! 🛑
        // =========================================================================================

        const IconArrowLeft = ({size=24, className=""}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>;
        const IconInstagram = ({size=24, className=""}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line></svg>;
        const IconSend = ({size=24, className=""}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>;
        const IconPhone = ({size=24, className=""}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path></svg>;
        const IconMapPin = ({size=24, className=""}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg>;
        const IconFire = ({size=24, className=""}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="currentColor" stroke="none" className={className}><path d="M11.25 22.5c-4.142 0-7.5-3.358-7.5-7.5 0-4.053 2.583-8.082 5.679-11.439a.75.75 0 0 1 1.258.287c.365 1.305.89 2.553 1.559 3.731.399.702 1.139 1.118 1.954 1.118h.08a.75.75 0 0 0 .584-1.218 10.323 10.323 0 0 0-1.802-1.832.75.75 0 0 1 .42-1.328 10.038 10.038 0 0 1 5.462 2.115c2.31 1.874 3.806 4.673 3.806 7.816 0 4.142-3.358 7.5-7.5 7.5Z" /></svg>;

        function App() {
            const [activeScreen, setActiveScreen] = useState('home');
            const [tours, setTours] = useState([]);
            const [isLoadingTours, setIsLoadingTours] = useState(true);
            const [dynamicBookingLink, setDynamicBookingLink] = useState(""); // Убрали дефолтный Телеграм отсюда

            useEffect(() => {
                // Инициализация Telegram
                if (window.Telegram?.WebApp) {
                    window.Telegram.WebApp.ready();
                    window.Telegram.WebApp.expand();
                }

                // Загрузка туров из Google Таблицы
                if (window.Papa && CONFIG.googleSheetUrl) {
                    window.Papa.parse(CONFIG.googleSheetUrl, {
                        download: true,
                        header: true,
                        skipEmptyLines: true,
                        complete: function(results) {
                            // 🔍 Ищем динамическую ссылку (даже если случайно добавили пробел в заголовок)
                            let foundGlobalLink = "";
                            
                            const validTours = results.data.map(row => {
                                // Находим ключ колонки, похожий на bookinglink
                                const linkKey = Object.keys(row).find(k => k.trim().toLowerCase() === 'bookinglink');
                                const rowLink = linkKey ? row[linkKey].trim() : '';
                                
                                if (rowLink && !foundGlobalLink) {
                                    foundGlobalLink = rowLink;
                                }
                                
                                return { ...row, _actualLink: rowLink };
                            }).filter(row => row.title && row.price);
                            
                            setDynamicBookingLink(foundGlobalLink);
                            setTours(validTours);
                            setIsLoadingTours(false);
                        },
                        error: function(err) {
                            console.error("Ошибка загрузки туров:", err);
                            setIsLoadingTours(false);
                        }
                    });
                } else {
                    setIsLoadingTours(false);
                }
            }, []);

            const triggerHaptic = () => {
                if (window.Telegram?.WebApp?.HapticFeedback) {
                    window.Telegram.WebApp.HapticFeedback.impactOccurred('light');
                } else if (navigator.vibrate) {
                    navigator.vibrate(50);
                }
            };

            const navigateTo = (screen, customLink = null) => {
                triggerHaptic();
                
                if (screen === 'booking') {
                    // Главная кнопка "Бронирование" - всегда ведет в Телеграм (из CONFIG)
                    const linkToOpen = CONFIG.bookingLink;
                    if (window.Telegram?.WebApp?.openLink) window.Telegram.WebApp.openLink(linkToOpen);
                    else window.open(linkToOpen, '_blank');
                    return;
                }
                
                if (screen === 'quiQuo') {
                    // Кнопки "Подробнее" в турах - ведут на ссылку Кви-Кво
                    // Берем ссылку из конкретного тура, либо общую ссылку из таблицы
                    const linkToOpen = customLink || dynamicBookingLink;
                    
                    if (!linkToOpen) {
                        alert("Ссылка на подборку еще не добавлена в таблицу!");
                        return;
                    }
                    
                    if (window.Telegram?.WebApp?.openLink) window.Telegram.WebApp.openLink(linkToOpen);
                    else window.open(linkToOpen, '_blank');
                    return;
                }

                setActiveScreen(screen);
                window.scrollTo(0, 0);
            };

            // Компонент декоративного Полароида
            const Polaroid = ({ src, className, tilt, children }) => (
                <div className={`absolute p-2 pb-10 bg-[#fdfdfd] shadow-[2px_10px_20px_rgba(0,0,0,0.3)] border border-gray-200/50 rounded-[2px] ${className}`} style={{ transform: `rotate(${tilt}deg)`, boxShadow: 'inset 0 0 5px rgba(0,0,0,0.1), 2px 10px 20px rgba(0,0,0,0.3)' }}>
                    {/* Изображение внутри декоративного полароида */}
                    <img src={src} alt="Travel" className="w-32 h-32 object-cover border border-gray-300/50" />
                    {children}
                </div>
            );

            // 📱 Главный контейнер (центрирует симулятор на ПК)
            return (
                <div className="min-h-screen sm:bg-zinc-800 flex justify-center sm:py-8 sm:items-center">
                    {/* 📱 Рамка симулятора мобильного с текстурой винтажной бумаги */}
                    <div className="mobile-simulator bg-paper text-[#2C2C2C] selection:bg-amber-200 hide-scrollbar">
                        
                        {/* -------------------- 🏠 ГЛАВНЫЙ ЭКРАН -------------------- */}
                        {activeScreen === 'home' && (
                            <div className="relative min-h-screen flex flex-col items-center p-4 animate-fade">
                                
                                {/* 🎨 ФОНОВЫЙ СЛОЙ С ДЕКОРОМ (не кликабельный) */}
                                <div className="absolute inset-0 pointer-events-none overflow-hidden opacity-80">
                                    
                                    {/* ✉️ Декор: Почтовый конверт (Изображение) */}
                                    <img 
                                        src="https://i.postimg.cc/d0Hphrqc/shablon-klev-club-oe00-p-shabloni-konvert-v-angliyu-22.jpg" 
                                        alt="Конверт" 
                                        className="absolute top-[350px] -left-[170px] w-[260px] h-[170px] transform -rotate-[12deg] z-0 shadow-[4px_6px_15px_rgba(0,0,0,0.2)] pointer-events-none object-cover" 
                                    />

                                    {/* 📷 Декор: Полароид в левом верхнем углу (Башня) */}
                                    <Polaroid src="https://images.unsplash.com/photo-1502602898657-3e91760cbb34?auto=format&fit=crop&q=80&w=300" className="top-10 -left-16 z-10" tilt={-12}>
                                        {/* 🔏 Декор: Штамп PARIS 24 OCT в правом верхнем углу этого полароида */}
                                        <div className="absolute top-1 right-1 opacity-80 text-[#1a1a1a] pointer-events-none rotate-[20deg]">
                                            <svg width="100" height="40" viewBox="0 0 120 50" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round">
                                                <circle cx="25" cy="25" r="20" />
                                                <circle cx="25" cy="25" r="14" />
                                                <text x="25" y="23" textAnchor="middle" fontSize="6" fill="currentColor" strokeWidth="0" className="font-sans font-bold">PARIS</text>
                                                <text x="25" y="32" textAnchor="middle" fontSize="5" fill="currentColor" strokeWidth="0" className="font-sans">24 OCT</text>
                                                <path d="M 50 15 Q 55 10, 60 15 T 70 15 T 80 15 T 90 15 T 100 15 T 110 15" />
                                                <path d="M 50 20 Q 55 15, 60 20 T 70 20 T 80 20 T 90 20 T 100 20 T 110 20" />
                                                <path d="M 50 25 Q 55 20, 60 25 T 70 25 T 80 25 T 90 25 T 100 25 T 110 25" />
                                                <path d="M 50 30 Q 55 25, 60 30 T 70 30 T 80 30 T 90 30 T 100 30 T 110 30" />
                                                <path d="M 50 35 Q 55 30, 60 35 T 70 35 T 80 35 T 90 35 T 100 35 T 110 35" />
                                            </svg>
                                        </div>
                                    </Polaroid>
                                    
                                    {/* 🖼️ Декор: Большая марка с картинкой (справа) */}
                                    <div className="absolute top-32 -right-6 transform rotate-[15deg] postage-stamp w-24 h-24 flex items-center justify-center">
                                        {/* Изображение внутри марки */}
                                        <img src="https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?auto=format&fit=crop&q=80&w=300" alt="Stamp" className="w-full h-full object-cover" />
                                    </div>

                                    {/* 📷 Декор: Полароид в правом нижнем углу */}
                                    <Polaroid src="https://images.unsplash.com/photo-1533105079780-92b9be482077?auto=format&fit=crop&q=80&w=300" className="bottom-20 -right-8" tilt={-8} />
                                    
                                    {/* 📷 Декор: Полароид в левом нижнем углу (с горами) */}
                                    <Polaroid src="https://images.unsplash.com/photo-1524231757912-21f4fe3a7200?auto=format&fit=crop&q=80&w=300" className="bottom-10 -left-10" tilt={12} />

                                    {/* 🔏 Декор: Круглая печать PARIS FRANCE (наложена на левый нижний полароид с горами) */}
                                    <div className="absolute bottom-[650px] right-[10px] z-20 opacity-40 -rotate-[15deg] pointer-events-none">
                                        <svg width="80" height="80" viewBox="0 0 100 100" fill="none" stroke="currentColor" strokeWidth="2">
                                            <circle cx="50" cy="50" r="45" strokeDasharray="5 5" />
                                            <circle cx="50" cy="50" r="35" />
                                            <text x="50" y="45" textAnchor="middle" fontSize="12" fill="currentColor" strokeWidth="0">PARIS</text>
                                            <text x="50" y="65" textAnchor="middle" fontSize="10" fill="currentColor" strokeWidth="0">FRANCE</text>
                                        </svg>
                                    </div>
                                    
                                    {/* 〰️ Декор: Горизонтальные линии слева посередине (имитация рукописного текста) */}
                                  
                                </div>

                                {/* 📌 ОСНОВНОЙ КОНТЕНТ (Поверх декора) */}
                                <div className="z-10 w-full max-w-sm flex flex-col items-center flex-1 mt-4">
                                    
                                    {/* 🧑‍💼 БЛОК: Шапка профиля */}
                                    <div className="flex flex-col items-center animate-item" style={{animationDelay: '0.1s'}}>
                                        {/* Картинка: Главный Аватар (берется из настроек CONFIG) */}
                                        <img src={CONFIG.avatarUrl} alt="Аватар" className="w-28 h-28 rounded-full object-cover border-4 border-white shadow-xl mb-2" />
                                        {/* Текст: Имя / Название бренда */}
                                        <h1 className="text-2xl font-serif font-bold text-[#2C2C2C] text-center uppercase tracking-tight">
                                            {CONFIG.brandName}
                                        </h1>
                                        {/* Текст: Слоган */}
                                        <p className="text-sm font-serif italic text-[#5c5c5c] text-center px-4 mt-1">
                                            {CONFIG.slogan}
                                        </p>
                                    </div>

                                    {/* 📸 БЛОК: Центральная композиция из 3-х Полароидов */}
                                    <div className="relative w-full flex justify-center items-center mt-6 mb-2 h-60 animate-item" style={{animationDelay: '0.15s'}}>
                                        
                                        {/* 1. Левый Полароид (Рим) */}
                                        <div className="absolute z-10 p-1.5 pb-10 bg-[#fdfdfd] border border-gray-200/50 rounded-[2px] transform rotate-[8deg] -translate-x-[85px] -translate-y-[10px]" style={{ boxShadow: 'inset 0 0 5px rgba(0,0,0,0.1), 2px 10px 20px rgba(0,0,0,0.3)' }}>
                                            {/* Картинка: Рим */}
                                            <img src="https://images.unsplash.com/photo-1552832230-c0197dd311b5?auto=format&fit=crop&q=80&w=300" alt="Rome" className="w-32 h-32 object-cover border border-gray-300/50" />
                                        </div>
                                        
                                        {/* 2. Центральный Полароид (Тайланд) - Находится поверх всех */}
                                        <div className="absolute z-30 p-1.5 pb-10 bg-[#fdfdfd] border border-gray-200/50 rounded-[2px] transform -rotate-[6deg] translate-x-[95px] translate-y-4" style={{ boxShadow: 'inset 0 0 5px rgba(0,0,0,0.1), 2px 10px 20px rgba(0,0,0,0.3)' }}>
                                            {/* Картинка: Тайланд */}
                                            <img src="https://images.unsplash.com/photo-1552465011-b4e21bf6e79a?auto=format&fit=crop&q=80&w=300" alt="Тайланд" className="w-32 h-32 object-cover border border-gray-300/50" />
                                            {/* Текст: Рукописная подпись под фото Тайланда */}
                                            <div className="absolute bottom-1 left-0 right-0 text-center text-[#0033aa] text-2xl" style={{ fontFamily: "'Caveat', cursive", transform: "rotate(-2deg)" }}>
                                                Тайланд 2026
                                            </div>
                                        </div>

                                        {/* 3. Правый Полароид (Париж) */}
                                        <div className="absolute z-20 p-2 pb-10 bg-[#fdfdfd] border border-gray-200/50 rounded-[2px] transform -rotate-2" style={{ boxShadow: 'inset 0 0 6px rgba(0,0,0,0.1), 4px_15px_25px_rgba(0,0,0,0.4)' }}>
                                            {/* Картинка: Париж */}
                                            <img src="https://images.unsplash.com/photo-1499856871958-5b9627545d1a?auto=format&fit=crop&q=80&w=400" alt="Paris" className="w-32 h-32 object-cover border border-gray-300/50" />
                                        </div>
                                    </div>

                                    {/* 🎛️ БЛОК: Основное меню (Кнопки) */}
                                    <div className="w-full flex flex-col gap-3 px-4 mt-auto mb-4">
                                        {/* Кнопка: Переход на экран "Обо мне" */}
                                        <button onClick={() => navigateTo('about')} className="animate-item bg-[#F8F1E5]/70 backdrop-blur-sm border-2 border-black rounded-full py-3 text-base font-medium shadow-[4px_4px_0px_0px_rgba(0,0,0,0.1)] active:translate-y-1 active:shadow-none transition-all" style={{animationDelay: '0.2s'}}>Обо мне</button>
                                        {/* Кнопка: Переход на экран "Горящие туры" */}
                                        <button onClick={() => navigateTo('tours')} className="animate-item bg-[#F8F1E5]/70 backdrop-blur-sm border-2 border-black rounded-full py-3 text-base font-medium shadow-[4px_4px_0px_0px_rgba(0,0,0,0.1)] active:translate-y-1 active:shadow-none transition-all" style={{animationDelay: '0.3s'}}>Горящие туры</button>
                                        {/* Кнопка: Переход по внешней ссылке "Бронирование" */}
                                        <button onClick={() => navigateTo('booking')} className="animate-item bg-[#F8F1E5]/70 backdrop-blur-sm border-2 border-black rounded-full py-3 text-base font-medium shadow-[4px_4px_0px_0px_rgba(0,0,0,0.1)] active:translate-y-1 active:shadow-none transition-all" style={{animationDelay: '0.4s'}}>Бронирование</button>
                                        {/* Кнопка: Переход на экран "Контакты" */}
                                        <button onClick={() => navigateTo('contacts')} className="animate-item bg-[#F8F1E5]/70 backdrop-blur-sm border-2 border-black rounded-full py-3 text-base font-medium shadow-[4px_4px_0px_0px_rgba(0,0,0,0.1)] active:translate-y-1 active:shadow-none transition-all" style={{animationDelay: '0.5s'}}>Контакты</button>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* -------------------- 👩‍🦰 ЭКРАН "ОБО МНЕ" -------------------- */}
                        {activeScreen === 'about' && (
                            <div className="min-h-screen p-6 animate-fade bg-paper">
                                {/* Кнопка: Возврат на главную страницу */}
                                <button onClick={() => navigateTo('home')} className="flex items-center gap-2 mb-6 font-medium text-black/70 hover:text-black">
                                    {/* Иконка стрелки назад */}
                                    <IconArrowLeft size={20} /> Назад
                                </button>
                                
                                {/* Картинка: Основное фото для раздела "Обо мне" */}
                                <div className="bg-white p-1 rounded-2xl shadow-md mb-6 rotate-1 max-w-sm mx-auto">
                                    <img src={CONFIG.about.photoUrl} alt="About me" className="w-full h-64 object-cover rounded-xl" />
                                </div>
                                
                                {/* Текстовый блок раздела "Обо мне" */}
                                <div className="max-w-sm mx-auto text-center px-2">
                                    {/* Текст: Заголовок раздела */}
                                    <h2 className="text-3xl font-serif font-bold mb-4">{CONFIG.about.title}</h2>
                                    {/* Текст: Подробное описание */}
                                    <p className="text-lg font-serif italic text-[#5c5c5c] leading-relaxed whitespace-pre-line">{CONFIG.about.text}</p>
                                </div>
                            </div>
                        )}

                        {/* -------------------- 🔥 ЭКРАН "ГОРЯЩИЕ ТУРЫ" -------------------- */}
                        {activeScreen === 'tours' && (
                            <div className="min-h-screen p-6 animate-fade bg-paper">
                                {/* Кнопка: Возврат на главную страницу */}
                                <button onClick={() => navigateTo('home')} className="flex items-center gap-2 mb-6 font-medium text-black/70 hover:text-black">
                                    {/* Иконка стрелки назад */}
                                    <IconArrowLeft size={20} /> Назад
                                </button>
                                
                                {/* Текст: Заголовок страницы туров */}
                                <h2 className="text-3xl font-serif font-bold mb-2 text-center">Горящие туры</h2>
                                
                                {/* Блок индикатора обновления */}
                                <div className="w-full flex justify-end items-center gap-1.5 mb-4 px-2">
                                    <span className="w-1.5 h-1.5 rounded-full bg-green-500 shadow-[0_0_4px_rgba(34,197,94,0.6)] animate-pulse"></span>
                                    <span className="text-[10px] font-serif italic text-[#5c5c5c]">Обновлено сегодня</span>
                                </div>
                                
                                {/* Логика загрузки туров из Google Таблицы */}
                                {isLoadingTours ? (
                                    /* Индикатор загрузки (колесо спиннера) */
                                    <div className="flex justify-center items-center h-40">
                                        <div className="w-8 h-8 border-4 border-black/20 border-t-black rounded-full animate-spin"></div>
                                    </div>
                                ) : tours.length === 0 ? (
                                    /* Текст-заглушка, если таблица пуста */
                                    <div className="text-center text-gray-500 font-serif italic py-10">Пока нет доступных туров...</div>
                                ) : (
                                    /* Список: Контейнер для всех карточек туров */
                                    <div className="flex flex-col gap-4 w-full">
                                        {tours.map((tour, index) => (
                                            /* 📦 БЛОК: Отдельная карточка тура (Новый горизонтальный дизайн) */
                                            <div key={tour.id || index} onClick={() => navigateTo('quiQuo', tour._actualLink)} className="relative bg-white p-3 rounded-2xl shadow-md flex gap-4 border border-[#E7D6BD] transition-transform active:scale-95 cursor-pointer">
                                                
                                                {/* ⭐ Салатовый квадратик рейтинга в верхнем правом углу */}
                                                <div className="absolute top-2 right-2 w-6 h-6 bg-[#84cc16] text-white text-[10px] font-bold rounded shadow-sm flex items-center justify-center z-10">
                                                    {tour.rating || "5.0"}
                                                </div>

                                                <div className="relative shrink-0">
                                                    <img src={tour.imageUrl || "https://images.unsplash.com/photo-1514282401047-d79a71a590e8?auto=format&fit=crop&w=300&q=80"} 
                                                         alt={tour.title} 
                                                         className="w-24 h-full min-h-[105px] object-cover rounded-xl" />
                                                </div>
                                                
                                                <div className="flex flex-col justify-between w-full min-w-0 py-0.5">
                                                    
                                                    <div className="flex flex-col gap-0.5">
                                                        {/* 1. Название отеля (1-я строка, как на фото) */}
                                                        <div className="font-bold text-[13px] text-[#2C2C2C] leading-snug pr-8 truncate">{tour.hotel}</div>
                                                        
                                                        {/* 2. Даты и инфо (2-я строка, как на фото) */}
                                                        <div className="text-[11px] text-gray-500 truncate">{tour.dates}</div>
                                                        
                                                        {/* 3. Локация с пином (3-я строка, как на фото) */}
                                                        <div className="text-[11px] text-gray-500 flex items-center gap-1 mt-0.5 truncate">
                                                            <svg className="w-3 h-3 text-gray-400 shrink-0" fill="currentColor" viewBox="0 0 20 20"><path fillRule="evenodd" d="M5.05 4.05a7 7 0 119.9 9.9L10 18.9l-4.95-4.95a7 7 0 010-9.9zM10 11a2 2 0 100-4 2 2 0 000 4z" clipRule="evenodd"></path></svg>
                                                            <span className="truncate">{tour.title}</span>
                                                        </div>
                                                    </div>
                                                    
                                                    <div className="flex items-end justify-between mt-3">
                                                        <div className="flex flex-col">
                                                            {/* Старая цена (зачеркнутая, серая) */}
                                                            <span className="line-through text-[10px] text-gray-400 font-medium mb-0.5">{tour.oldPrice || "150 000 ₽"}</span>
                                                            {/* Новая цена (крупнее и жирным) */}
                                                            <span className="font-bold text-[15px] text-[#2C2C2C] leading-none">{tour.price}</span>
                                                        </div>
                                                        <button 
                                                            onClick={(e) => { e.stopPropagation(); navigateTo('quiQuo', tour._actualLink); }} 
                                                            className="bg-black text-white text-[11px] font-semibold py-1.5 px-3 rounded-lg hover:bg-gray-800 transition-colors shrink-0 ml-2"
                                                        >
                                                            Подробнее
                                                        </button>
                                                    </div>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </div>
                        )}

                        {/* -------------------- 📞 ЭКРАН "КОНТАКТЫ" -------------------- */}
                        {activeScreen === 'contacts' && (
                            <div className="min-h-screen p-6 animate-fade bg-paper flex flex-col">
                                {/* Кнопка: Возврат на главную страницу */}
                                <button onClick={() => navigateTo('home')} className="flex items-center gap-2 mb-6 font-medium text-black/70 hover:text-black">
                                    {/* Иконка стрелки назад */}
                                    <IconArrowLeft size={20} /> Назад
                                </button>
                                
                                {/* Контейнер для кнопок связи (отцентрированный) */}
                                <div className="flex-1 flex flex-col items-center justify-center max-w-sm mx-auto w-full">
                                    {/* Текст: Заголовок экрана контактов */}
                                    <h2 className="text-3xl font-serif font-bold mb-8 text-center text-gray-800">Всегда на связи</h2>
                                    
                                    {/* Список кнопок для связи */}
                                    <div className="w-full flex flex-col gap-4">
                                        {/* Кнопка: Ссылка на Telegram */}
                                        <a href={CONFIG.contacts.telegram} target="_blank" rel="noreferrer" onClick={triggerHaptic} className="flex items-center gap-4 bg-white/70 backdrop-blur-md p-4 rounded-3xl border border-white shadow-sm active:scale-95 transition-all text-gray-800 hover:bg-white">
                                            {/* Иконка: Telegram (бумажный самолетик) */}
                                            <div className="bg-white p-3 rounded-full shadow-[0_2px_8px_rgba(0,0,0,0.08)] text-[#0088cc]">
                                                <IconSend size={24} />
                                            </div>
                                            {/* Текст на кнопке */}
                                            <span className="text-lg font-medium">Написать в Telegram</span>
                                        </a>
                                        
                                        {/* Кнопка: Ссылка на Instagram */}
                                        <a href={CONFIG.contacts.instagram} target="_blank" rel="noreferrer" onClick={triggerHaptic} className="flex items-center gap-4 bg-white/70 backdrop-blur-md p-4 rounded-3xl border border-white shadow-sm active:scale-95 transition-all text-gray-800 hover:bg-white">
                                            {/* Иконка: Instagram */}
                                            <div className="bg-white p-3 rounded-full shadow-[0_2px_8px_rgba(0,0,0,0.08)] text-[#E1306C]">
                                                <IconInstagram size={24} />
                                            </div>
                                            {/* Текст на кнопке */}
                                            <span className="text-lg font-medium">Мой Instagram</span>
                                        </a>
                                        
                                        {/* Кнопка: Ссылка на Телефонный звонок */}
                                        <a href={`tel:${CONFIG.contacts.phone.replace(/[^0-9+]/g, '')}`} onClick={triggerHaptic} className="flex items-center gap-4 bg-white/70 backdrop-blur-md p-4 rounded-3xl border border-white shadow-sm active:scale-95 transition-all text-gray-800 hover:bg-white">
                                            {/* Иконка: Телефонная трубка */}
                                            <div className="bg-white p-3 rounded-full shadow-[0_2px_8px_rgba(0,0,0,0.08)] text-green-600">
                                                <IconPhone size={24} />
                                            </div>
                                            {/* Текст: Номер телефона */}
                                            <span className="text-lg font-medium">{CONFIG.contacts.phone}</span>
                                        </a>
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
