<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Trobetrotter</title>
    
    <!-- Подключаем Tailwind для стилей -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Подключаем React -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    
    <!-- Подключаем Babel, чтобы браузер понял React-код внутри HTML -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Подключаем Telegram Web App SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <style>
        body { margin: 0; padding: 0; font-family: sans-serif; -webkit-tap-highlight-color: transparent; }
        @keyframes slideUpFade {
            0% { opacity: 0; transform: translateY(30px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeIn {
            0% { opacity: 0; }
            100% { opacity: 1; }
        }
        .animate-item {
            animation: slideUpFade 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
        }
        .animate-fade {
            animation: fadeIn 0.5s ease-out forwards;
        }

        /* --- СИМУЛЯТОР ТЕЛЕФОНА ДЛЯ ПРЕДПРОСМОТРА --- */
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .mobile-simulator {
            height: 100dvh;
            width: 100%;
            position: relative;
            overflow-x: hidden;
            overflow-y: auto;
        }
        @media (min-width: 640px) {
            .mobile-simulator {
                height: 800px;
                max-width: 400px;
                border-radius: 45px;
                border: 12px solid #121212;
                box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
            }
        }
        /* Чтобы внутренние экраны правильно тянулись по высоте симулятора */
        .mobile-simulator > div {
            min-height: 100% !important;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // ============================================================================
        // 🛠️ НАСТРОЙКИ (ВАЙБКОДИНГ ЗДЕСЬ) 🛠️
        // Просто меняй текст в кавычках. Всё остальное обновится автоматически!
        // ============================================================================

        const CONFIG = {
            brandName: "Ольга Иванова",
            slogan: "Твой личный тревел-эксперт", // <-- Твой слоган здесь!
            avatarUrl: "https://images.unsplash.com/photo-1573496359142-b8d87734a5a2?auto=format&fit=crop&q=80&w=200", // Ссылка на твое фото в кружочке

            // --- 🔥 НАСТРОЙКИ FIREBASE ---
            firebaseConfig: {
                apiKey: "AIzaSyDrraU_Y3l8B9_R6Dl3PgKVucEluG_Bacw",
                authDomain: "mini-apps-d5096.firebaseapp.com",
                projectId: "mini-apps-d5096",
                storageBucket: "mini-apps-d5096.firebasestorage.app",
                messagingSenderId: "625952325109",
                appId: "1:625952325109:web:a0de707bc19b50005574bc"
            },

            about: {
                title: "Обо мне",
                text: "Привет! Я твой личный тревел-эксперт. Я помогаю людям находить идеальные места для отдыха, организую незабываемые туры и беру всю рутину с документами на себя. Моя цель — сделать так, чтобы ты просто собрал чемодан и наслаждался отпуском!",
                photoUrl: "https://images.unsplash.com/photo-1436491865332-7a61a109cc05?auto=format&fit=crop&q=80&w=400",
            },

            bookingLink: "https://t.me/telegram", 

            contacts: {
                telegram: "https://t.me/telegram",
                instagram: "https://instagram.com/instagram",
                whatsapp: "https://wa.me/1234567890",
                phone: "+7 (999) 123-45-67"
            },

            tours: [
                {
                    id: 1,
                    title: "Мальдивы: Райский остров",
                    price: "от 150 000 ₽",
                    dates: "12.08 - 19.08 (7 ночей)",
                    hotel: "Sun Island Resort 5*",
                    imageUrl: "https://images.unsplash.com/photo-1514282401047-d79a71a590e8?auto=format&fit=crop&q=80&w=400"
                },
                {
                    id: 2,
                    title: "Турция, Анталья",
                    price: "от 65 000 ₽",
                    dates: "15.08 - 25.08 (10 ночей)",
                    hotel: "Rixos Premium 5*",
                    imageUrl: "https://images.unsplash.com/photo-1541417904950-b855846fe074?auto=format&fit=crop&q=80&w=400"
                },
                {
                    id: 3,
                    title: "ОАЭ, Дубай",
                    price: "от 90 000 ₽",
                    dates: "20.08 - 27.08 (7 ночей)",
                    hotel: "Marina Byblos 4*",
                    imageUrl: "https://images.unsplash.com/photo-1512453979798-5ea266f8880c?auto=format&fit=crop&q=80&w=400"
                }
            ]
        };

        // ============================================================================
        // 🛑 ИКОНКИ (Вспомогательный код)
        // ============================================================================
        const IconGlobe = ({size=24, className=""}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"></circle><line x1="2" y1="12" x2="22" y2="12"></line><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path></svg>;
        const IconArrowLeft = ({size=24, className=""}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>;
        const IconInstagram = ({size=24, className=""}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line></svg>;
        const IconSend = ({size=24, className=""}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>;
        const IconPhone = ({size=24, className=""}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path></svg>;
        const IconMapPin = ({size=24, className=""}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg>;

        // ============================================================================
        // 🛑 КОНЕЦ БЛОКА НАСТРОЕК. ДАЛЬШЕ ИДЕТ МАГИЯ КОДА
        // ============================================================================

        function App() {
            const [activeScreen, setActiveScreen] = useState('home');

            useEffect(() => {
                if (window.Telegram?.WebApp) {
                    window.Telegram.WebApp.ready();
                    window.Telegram.WebApp.expand();
                }
            }, []);

            const triggerHaptic = () => {
                if (window.Telegram?.WebApp?.HapticFeedback) {
                    window.Telegram.WebApp.HapticFeedback.impactOccurred('light');
                } else if (navigator.vibrate) {
                    navigator.vibrate(50);
                }
            };

            const navigateTo = (screen) => {
                triggerHaptic();
                if (screen === 'booking') {
                    if (window.Telegram?.WebApp?.openLink) {
                        window.Telegram.WebApp.openLink(CONFIG.bookingLink);
                    } else {
                        window.open(CONFIG.bookingLink, '_blank');
                    }
                    return;
                }
                setActiveScreen(screen);
                window.scrollTo(0, 0);
            };

            const Polaroid = ({ src, className, tilt }) => (
                <div className={`absolute p-2 bg-white shadow-lg rounded-sm ${className}`} style={{ transform: `rotate(${tilt}deg)` }}>
                    <img src={src} alt="Travel" className="w-24 h-24 object-cover" />
                </div>
            );

            return (
                <div className="min-h-screen sm:bg-zinc-800 flex justify-center sm:py-8 sm:items-center">
                    {/* --- МОБИЛЬНЫЙ КОНТЕЙНЕР (СИМУЛЯТОР ТЕЛЕФОНА) --- */}
                    <div className="mobile-simulator bg-[#F2E8D9] text-[#2C2C2C] font-sans selection:bg-amber-200 hide-scrollbar">
                        
                        {/* --- ГЛАВНЫЙ ЭКРАН --- */}
                        {activeScreen === 'home' && (
                            <div className="relative min-h-screen flex flex-col items-center p-6 animate-fade">
                                <div className="absolute inset-0 pointer-events-none overflow-hidden opacity-80">
                                    <Polaroid src="https://images.unsplash.com/photo-1502602898657-3e91760cbb34?auto=format&fit=crop&q=80&w=200" className="top-10 -left-6" tilt={-12} />
                                <Polaroid src="https://images.unsplash.com/photo-1590523277543-a94d2e4eb00b?auto=format&fit=crop&q=80&w=200" className="top-32 -right-8" tilt={15} />
                                <Polaroid src="https://images.unsplash.com/photo-1533105079780-92b9be482077?auto=format&fit=crop&q=80&w=200" className="bottom-10 -right-4" tilt={-8} />
                                
                                <div className="absolute top-8 right-12 opacity-40 rotate-12">
                                    <svg width="80" height="80" viewBox="0 0 100 100" fill="none" stroke="currentColor" strokeWidth="2">
                                        <circle cx="50" cy="50" r="45" strokeDasharray="5 5" />
                                        <circle cx="50" cy="50" r="35" />
                                        <text x="50" y="45" textAnchor="middle" fontSize="12" fill="currentColor" strokeWidth="0">PARIS</text>
                                        <text x="50" y="65" textAnchor="middle" fontSize="10" fill="currentColor" strokeWidth="0">FRANCE</text>
                                    </svg>
                                </div>
                                
                                <div className="absolute top-1/2 left-4 w-24 h-32 opacity-30 -rotate-6 flex flex-col gap-2">
                                   <div className="w-full h-px bg-gray-600"></div>
                                   <div className="w-5/6 h-px bg-gray-600"></div>
                                   <div className="w-full h-px bg-gray-600"></div>
                                   <div className="w-4/6 h-px bg-gray-600"></div>
                                </div>
                            </div>

                            <div className="z-10 w-full max-w-sm flex flex-col items-center flex-1 mt-8">
                                <div className="flex flex-col items-center animate-item" style={{animationDelay: '0.1s'}}>
                                    <img src={CONFIG.avatarUrl} alt="Аватар" className="w-32 h-32 rounded-full object-cover border-4 border-white shadow-xl mb-4" />
                                    <h1 className="text-3xl font-serif font-bold text-[#2C2C2C] text-center">
                                        {CONFIG.brandName}
                                    </h1>
                                    <p className="text-sm font-serif italic text-[#5c5c5c] mt-1 text-center px-4">
                                        {CONFIG.slogan}
                                    </p>
                                </div>

                                {/* ТРИ ЦЕНТРАЛЬНЫХ ПОЛАРОИДА */}
                                <div className="relative w-full flex justify-center items-center mt-12 mb-10 h-56 animate-item" style={{animationDelay: '0.15s'}}>
                                    {/* Левый */}
                                    <div className="absolute z-10 p-3 pb-14 bg-[#FAFAFA] shadow-[0_8px_15px_-3px_rgba(0,0,0,0.2)] rounded-sm transform -rotate-[12deg] -translate-x-24 translate-y-6">
                                        <img src="https://images.unsplash.com/photo-1552832230-c0197dd311b5?auto=format&fit=crop&q=80&w=300" alt="Rome" className="w-32 h-32 object-cover border border-gray-200" />
                                    </div>
                                    
                                    {/* Правый */}
                                    <div className="absolute z-10 p-3 pb-14 bg-[#FAFAFA] shadow-[0_8px_15px_-3px_rgba(0,0,0,0.2)] rounded-sm transform rotate-[15deg] translate-x-24 translate-y-6">
                                        <img src="https://images.unsplash.com/photo-1518182170546-076616fdfaaf?auto=format&fit=crop&q=80&w=300" alt="Pyramid" className="w-32 h-32 object-cover border border-gray-200" />
                                        <div className="absolute bottom-4 left-0 right-0 text-center font-serif italic text-[11px] text-gray-500 -rotate-2">Famous Polaroid</div>
                                    </div>

                                    {/* Центральный (сверху) */}
                                    <div className="absolute z-20 p-3.5 pb-16 bg-[#FAFAFA] shadow-[0_15px_30px_-5px_rgba(0,0,0,0.3)] rounded-sm transform -rotate-2">
                                        <img src="https://images.unsplash.com/photo-1499856871958-5b9627545d1a?auto=format&fit=crop&q=80&w=400" alt="Paris" className="w-36 h-36 object-cover border border-gray-200" />
                                    </div>
                                </div>

                                <div className="w-full flex flex-col gap-4 px-4 mt-auto mb-6">
                                    <button onClick={() => navigateTo('about')} className="animate-item bg-[#F8F1E5]/90 backdrop-blur-sm border-2 border-black rounded-full py-4 text-lg font-medium shadow-[4px_4px_0px_0px_rgba(0,0,0,0.1)] active:translate-y-1 active:shadow-none transition-all" style={{animationDelay: '0.2s'}}>Обо мне</button>
                                    <button onClick={() => navigateTo('tours')} className="animate-item bg-[#F8F1E5]/90 backdrop-blur-sm border-2 border-black rounded-full py-4 text-lg font-medium shadow-[4px_4px_0px_0px_rgba(0,0,0,0.1)] active:translate-y-1 active:shadow-none transition-all" style={{animationDelay: '0.3s'}}>Горящие туры</button>
                                    <button onClick={() => navigateTo('booking')} className="animate-item bg-[#F8F1E5]/90 backdrop-blur-sm border-2 border-black rounded-full py-4 text-lg font-medium shadow-[4px_4px_0px_0px_rgba(0,0,0,0.1)] active:translate-y-1 active:shadow-none transition-all" style={{animationDelay: '0.4s'}}>Бронирование</button>
                                    <button onClick={() => navigateTo('contacts')} className="animate-item bg-[#F8F1E5]/90 backdrop-blur-sm border-2 border-black rounded-full py-4 text-lg font-medium shadow-[4px_4px_0px_0px_rgba(0,0,0,0.1)] active:translate-y-1 active:shadow-none transition-all" style={{animationDelay: '0.5s'}}>Контакты</button>
                                </div>
                            </div>
                        </div>
                        )}

                        {/* --- ЭКРАН "ОБО МНЕ" --- */}
                        {activeScreen === 'about' && (
                        <div className="min-h-screen p-6 animate-fade bg-[#FAF4ED]">
                            <button onClick={() => navigateTo('home')} className="flex items-center gap-2 mb-6 font-medium text-black/70 hover:text-black">
                                <IconArrowLeft size={20} /> Назад
                            </button>
                            
                            <div className="bg-white p-1 rounded-sm shadow-md mb-6 rotate-1 max-w-sm mx-auto">
                                <img src={CONFIG.about.photoUrl} alt="About me" className="w-full h-64 object-cover" />
                            </div>
                            
                            <div className="max-w-sm mx-auto">
                                <h2 className="text-3xl font-serif font-bold mb-4">{CONFIG.about.title}</h2>
                                <div className="bg-white/60 p-5 rounded-2xl border border-[#E7D6BD] shadow-sm">
                                    <p className="text-lg leading-relaxed whitespace-pre-line">{CONFIG.about.text}</p>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* --- ЭКРАН "ГОРЯЩИЕ ТУРЫ" --- */}
                    {activeScreen === 'tours' && (
                        <div className="min-h-screen p-6 animate-fade bg-[#FAF4ED]">
                            <button onClick={() => navigateTo('home')} className="flex items-center gap-2 mb-6 font-medium text-black/70 hover:text-black">
                                <IconArrowLeft size={20} /> Назад
                            </button>
                            
                            <h2 className="text-3xl font-serif font-bold mb-6 text-center">Горящие туры</h2>
                            
                            <div className="flex flex-col gap-6 max-w-sm mx-auto">
                                {CONFIG.tours.map((tour) => (
                                    <div key={tour.id} className="bg-white rounded-2xl overflow-hidden shadow-lg border border-[#E7D6BD]">
                                        <div className="relative h-48">
                                            <img src={tour.imageUrl} alt={tour.title} className="w-full h-full object-cover" />
                                            <div className="absolute top-3 right-3 bg-red-500 text-white text-xs font-bold px-3 py-1 rounded-full uppercase tracking-wider">HOT</div>
                                        </div>
                                        <div className="p-5">
                                            <h3 className="text-xl font-bold mb-2">{tour.title}</h3>
                                            <div className="flex items-center gap-2 text-gray-600 text-sm mb-1">
                                                <IconMapPin size={16} /> {tour.hotel}
                                            </div>
                                            <p className="text-gray-600 text-sm mb-4">{tour.dates}</p>
                                            
                                            <div className="flex items-center justify-between mt-4 pt-4 border-t border-gray-100">
                                                <span className="text-2xl font-bold text-amber-600">{tour.price}</span>
                                                <button onClick={() => navigateTo('booking')} className="bg-black text-white px-5 py-2 rounded-full font-medium active:scale-95 transition-transform">Хочу!</button>
                                            </div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}

                    {/* --- ЭКРАН "КОНТАКТЫ" --- */}
                    {activeScreen === 'contacts' && (
                        <div className="min-h-screen p-6 animate-fade bg-[#FAF4ED] flex flex-col">
                            <button onClick={() => navigateTo('home')} className="flex items-center gap-2 mb-6 font-medium text-black/70 hover:text-black">
                                <IconArrowLeft size={20} /> Назад
                            </button>
                            
                            <div className="flex-1 flex flex-col items-center justify-center max-w-sm mx-auto w-full">
                                <div className="bg-[#E7D6BD] p-4 rounded-full border-2 border-black mb-6 shadow-md rotate-[-5deg]">
                                    <IconSend size={40} className="text-black" />
                                </div>
                                
                                <h2 className="text-3xl font-serif font-bold mb-8 text-center">Давайте на связи!</h2>
                                
                                <div className="w-full flex flex-col gap-4">
                                    <a href={CONFIG.contacts.telegram} target="_blank" rel="noreferrer" onClick={triggerHaptic} className="flex items-center gap-4 bg-white p-4 rounded-2xl border-2 border-black shadow-[3px_3px_0px_0px_rgba(0,0,0,1)] active:translate-y-1 active:shadow-none transition-all">
                                        <IconSend className="text-[#0088cc]" size={28} />
                                        <span className="text-lg font-medium">Написать в Telegram</span>
                                    </a>
                                    
                                    <a href={CONFIG.contacts.instagram} target="_blank" rel="noreferrer" onClick={triggerHaptic} className="flex items-center gap-4 bg-white p-4 rounded-2xl border-2 border-black shadow-[3px_3px_0px_0px_rgba(0,0,0,1)] active:translate-y-1 active:shadow-none transition-all">
                                        <IconInstagram className="text-[#E1306C]" size={28} />
                                        <span className="text-lg font-medium">Мой Instagram</span>
                                    </a>

                                    <a href={`tel:${CONFIG.contacts.phone.replace(/[^0-9+]/g, '')}`} onClick={triggerHaptic} className="flex items-center gap-4 bg-white p-4 rounded-2xl border-2 border-black shadow-[3px_3px_0px_0px_rgba(0,0,0,1)] active:translate-y-1 active:shadow-none transition-all">
                                        <IconPhone className="text-green-600" size={28} />
                                        <span className="text-lg font-medium">{CONFIG.contacts.phone}</span>
                                    </a>
                                </div>
                            </div>
                        </div>
                    )}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
